case_id: rsec_ms3d_2021_0016_vuln
suite: regression
category: regression-rustsec-external
schema_version: 3

source:
  crate_name: ms3d
  vulnerable_version: "=0.1.2"
  fixed_version: ">=0.1.3"
  advisory: RUSTSEC-2021-0016
  cve: CVE-2021-26952
  ghsa: GHSA-9f5r-vqm5-m342
  url: https://rustsec.org/advisories/RUSTSEC-2021-0016.html
  upstream_issue: https://github.com/andrewhickman/ms3d/issues/1
  upstream_pr: https://github.com/andrewhickman/ms3d/commit/599313b
  external_crate: true
  affected_function: ms3d::Model::from_reader

ground_truth:
  primary_label: OracleConfirmedBug
  relation: NoneObserved
  oracle_verdict: MiriUndefinedBehavior
  harness_status: LikelyValid
  security_relevant: true
  oracle_confirmable: true
  expected_reached_count: 1

dangerous_categories:
  - AllocationInitialization
  - UserProvidedRead
  - MaybeUninit
panic_kinds: []

harness:
  path: fuzz/fuzz_targets/fuzz_target_1.rs
  validity_rationale: |
    The harness invokes the real public ms3d 0.1.2 Model::from_reader API with a
    safe custom Read implementation. The Read implementation only performs an
    operation permitted by Rust's Read trait contract: it inspects the provided
    byte slice before filling it. The invalid state originates inside the
    vulnerable crate because it passes an uninitialized internal buffer to user
    code.

selection:
  reason: |
    Public RustSec/GHSA regression. Affected ms3d versions constructed an
    uninitialized buffer and passed it to a user-provided Read implementation;
    reading from that buffer can cause undefined behavior. This is a strong
    oracle-oriented regression case for RustDPR because the harness is safe and
    the expected evidence is Miri-confirmable.
  negative_case: false
  manually_labeled: true

controls:
  fixed_version_case: rsec_ms3d_2021_0016_fixed
  official_fixed_version_available: true

execution:
  deterministic_test: rustdpr_deterministic_trace_replay

notes:
  oracle_expectation: |
    Under Miri, the vulnerable version should report undefined behavior when the
    custom Read implementation observes bytes from ms3d's uninitialized buffer.
