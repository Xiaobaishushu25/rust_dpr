case_id: rsec_slice_deque_2021_0047_vuln
suite: regression
category: regression-rustsec-external
schema_version: 2

source:
  crate_name: slice-deque
  vulnerable_version: "0.3.0"
  fixed_version: null
  advisory: RUSTSEC-2021-0047
  cve: CVE-2021-29938
  ghsa: GHSA-p9gf-gmfv-398m
  url: https://rustsec.org/advisories/RUSTSEC-2021-0047.html
  upstream_issue: https://github.com/gnzlbg/slice_deque/issues/90

ground_truth:
  primary_label: PanicAfterUnsafe
  relation: AfterUnsafe
  oracle_verdict: Unknown
  harness_status: LikelyValid
  security_relevant: true
  oracle_confirmable: true
  expected_reached_count: 1

dangerous_categories:
  - RawPointer
  - AllocationOwnership
  - DropInvariant

notes:
  replay_evidence: >
    On Windows/MSVC debug builds, the public PoC aborts inside
    slice-deque 0.3.0 with a Rust unsafe precondition violation:
    slice::get_unchecked_mut requires that the index is within the slice.
    This is treated as replay evidence for the vulnerable dangerous path.
  platform_behavior: >
    On some platforms/builds, the historical issue manifests as duplicate
    drop or double-drop behavior. On this Windows/MSVC environment, it
    manifests as a non-unwinding panic / STATUS_STACK_BUFFER_OVERRUN after
    the invalid unsafe access is detected.

selection:
  reason: >-
    Public RustSec/GHSA advisory. The reproducer calls the real vulnerable
    slice-deque 0.3.0 public API SliceDeque::drain_filter and observes an
    abnormal drop pattern after predicate panic, rather than imitating the
    bug with a local Vec.
  negative_case: false
  manually_labeled: true
  minimized: false
  external_crate: true

controls:
  fixed_version_case: null
  official_fixed_version_available: false
  control_note: >-
    The public advisory lists no patched version. The paired control is a
    manual fixed-order control, not an official upstream fixed release.
