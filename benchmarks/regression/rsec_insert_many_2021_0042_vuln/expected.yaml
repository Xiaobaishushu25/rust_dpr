case_id: rsec_insert_many_2021_0042_vuln
suite: regression
category: regression-rustsec-external
schema_version: 3

source:
  crate_name: insert_many
  vulnerable_version: "=0.1.1"
  fixed_version: null
  advisory: RUSTSEC-2021-0042
  cve: CVE-2021-29933
  ghsa: GHSA-29hg-r7c7-54fr
  url: https://rustsec.org/advisories/RUSTSEC-2021-0042.html
  upstream_issue: https://github.com/rphmeier/insert_many/issues/1
  upstream_pr: null
  external_crate: true
  affected_function: insert_many::InsertMany::insert_many

ground_truth:
  primary_label: PanicAfterUnsafe
  relation: AfterUnsafe
  oracle_verdict: MiriUnsupported
  harness_status: LikelyValid
  security_relevant: true
  oracle_confirmable: false
  expected_reached_count: 1

dangerous_categories:
  - RawPointer
  - AllocationOwnership
  - DropInvariant
panic_kinds:
  - IteratorPanic

harness:
  path: fuzz/fuzz_targets/fuzz_target_1.rs
  validity_rationale: |
    The harness calls the real public InsertMany::insert_many API on
    a Vec<DropDetector> through insert_many 0.1.1. It does not
    fabricate raw pointers, invalid lengths, or invalid ownership
    state. The only adversarial behavior is a user-provided
    ExactSizeIterator whose next() panics, which is exactly the
    public advisory trigger.

selection:
  reason: |
    Public RustSec/GHSA regression with no patched version. The
    vulnerable API uses ptr::copy to shift Vec elements before
    consuming an ExactSizeIterator. If iterator.next() panics, the
    Vec can contain duplicated ownership and drop the same allocation
    twice during unwinding.
  negative_case: false
  manually_labeled: true

controls:
  fixed_version_case: null
  official_fixed_version_available: false

execution:
  deterministic_test: rustdpr_deterministic_trace_replay

notes:
  replay_evidence: |
    This vulnerable-only case uses child-process replay because the
    historical bug may terminate by panic, abort, allocator double-free
    diagnostics, or platform-specific abnormal process exit. ASan/Miri
    can be used later to upgrade oracle_verdict only after a confirmed
    local oracle run.
