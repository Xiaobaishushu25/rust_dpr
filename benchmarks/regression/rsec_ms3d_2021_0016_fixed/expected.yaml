case_id: rsec_ms3d_2021_0016_fixed
suite: regression
category: regression-rustsec-external-control
schema_version: 3

source:
  crate_name: ms3d
  vulnerable_version: "=0.1.2"
  fixed_version: "=0.1.3"
  advisory: RUSTSEC-2021-0016
  cve: CVE-2021-26952
  ghsa: GHSA-9f5r-vqm5-m342
  url: https://rustsec.org/advisories/RUSTSEC-2021-0016.html
  upstream_issue: https://github.com/andrewhickman/ms3d/issues/1
  upstream_pr: https://github.com/andrewhickman/ms3d/commit/599313b
  external_crate: true
  affected_function: ms3d::Model::from_reader

ground_truth:
  primary_label: DangerousPathReached
  relation: NoneObserved
  oracle_verdict: NoOracleFinding
  harness_status: LikelyValid
  security_relevant: false
  oracle_confirmable: true
  expected_reached_count: 1

dangerous_categories:
  - AllocationInitialization
  - UserProvidedRead
panic_kinds: []

harness:
  path: fuzz/fuzz_targets/fuzz_target_1.rs
  validity_rationale: |
    The fixed-version control uses the same public API shape and the same safe
    custom Read implementation as the vulnerable case. The only intended change
    is the external crate version: ms3d 0.1.3 zero-initializes the internal buffer
    before passing it to user code.

selection:
  reason: |
    Paired fixed-version control for RUSTSEC-2021-0016. It should still exercise
    Model::from_reader and the user-provided Read boundary, but should not expose
    uninitialized bytes or produce a Miri undefined-behavior verdict.
  negative_case: true
  manually_labeled: true

controls:
  fixed_version_case: null
  paired_vulnerable_case: rsec_ms3d_2021_0016_vuln
  official_fixed_version_available: true

execution:
  deterministic_test: rustdpr_deterministic_trace_replay

notes:
  oracle_expectation: |
    The first observed byte before user writes should be initialized, normally 0,
    because the fixed crate resized the internal buffer with zero initialization.
