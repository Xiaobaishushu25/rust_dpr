schema_version: "0.3.0"
benchmark_name: RustDPRBench

suites:
  micro:
    description: Controlled semantic cases for panic-danger relation.
    expected_cases_min: 30
  oracle:
    description: Controlled cases with ASan/Miri-confirmable bugs.
    expected_cases_min: 10
  taxonomy:
    description: Panic-danger taxonomy stress cases.
    expected_cases_min: 20
  regression:
    description: Historical RustSec/CVE/GitHub cases.
    expected_cases_min: 12
  realworld:
    description: Selected real-world crates, with local pilot extracts separated from pinned external crate wrappers.
    expected_cases_min: 10
    external_cases_min_round1: 6
  generated_harness:
    description: External generated harnesses from RPG/RULF/FourFuzz/deepSURF-style pipelines.
    expected_cases_min: 0
    target_cases_round1: 5

selection_criteria:
  realworld:
    - crate builds with pinned toolchain
    - pins crate version or commit and records license/source URL
    - wrapper calls real external crate public API rather than reimplementing core logic
    - contains unsafe/FFI/manual allocation/drop-sensitive code or is a deliberate negative/control case
    - has stable tests or fuzz harness
    - covers at least one domain category
  regression:
    - public advisory or issue
    - vulnerable version is buildable
    - reproducer or regression test exists
    - root cause relevant to unsafe/FFI/panic/drop/raw pointer

label_policy:
  annotators: 2
  agreement_metric: CohenKappa
  adjudication_required: true
