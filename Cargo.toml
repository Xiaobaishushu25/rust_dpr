[workspace]
members = [
  "crates/rustdpr-core",
  "crates/rustdpr-cli",
  "crates/rustdpr-analyzer",
  "crates/rustdpr-trace",
  "crates/rustdpr-classifier",
  "crates/rustdpr-report",
  "crates/rustdpr-oracle",

  "benchmarks/micro/mb_unwrap_shallow",
  "benchmarks/micro/mb_panic_before_unsafe",
  "benchmarks/micro/mb_panic_after_unsafe",
  "benchmarks/oracle/mb_double_free",
  "benchmarks/oracle/mb_heap_uaf",
  "benchmarks/oracle/mb_oob_raw",
  "benchmarks/taxonomy/panic_before_unsafe",
]
exclude = [
  "benchmarks/micro/mb_panic_after_unsafe/fuzz",
  "benchmarks/micro/mb_panic_before_unsafe/fuzz",
]
resolver = "2"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
walkdir = "2"
syn = { version = "2", features = ["full", "visit"] }
quote = "1"
petgraph = "0.6"
once_cell = "1"
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
debug = true
lto = "thin"
codegen-units = 1
